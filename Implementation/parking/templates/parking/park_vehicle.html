{% extends "parking/base.html" %}
{% block title %}Park Vehicle{% endblock %}
{% block content %}
<h4 class="mb-4"><i class="bi bi-box-arrow-in-right me-2"></i>Park a Vehicle</h4>
<div class="card border-0 shadow-sm" style="max-width:540px;">
  <div class="card-body">
    <form method="post">{% csrf_token %}
      <div class="mb-3"><label class="form-label">License Plate</label><input type="text" name="license_plate" class="form-control" required placeholder="e.g. ABC-1234"></div>
      <div class="mb-3"><label class="form-label">Vehicle Type</label>
        <select name="vehicle_type" class="form-select" required>
          {% for val, label in vehicle_types %}<option value="{{ val }}">{{ label }}</option>{% endfor %}
        </select>
      </div>
      <div class="mb-3"><label class="form-label">Owner Name (optional)</label><input type="text" name="owner_name" class="form-control"></div>
      <button class="btn btn-primary w-100"><i class="bi bi-check-lg me-1"></i>Assign Slot &amp; Generate Ticket</button>
    </form>
  </div>
</div>
{% endblock %}
