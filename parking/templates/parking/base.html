<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>{% block title %}Smart Parking{% endblock %}</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
<style>
:root{--primary:#1a2744;--accent:#00b4d8;--success:#06d6a0;--danger:#ef476f;--warning:#ffd166;}
body{background:#f0f2f5;font-family:'Segoe UI',system-ui,sans-serif;}
.sidebar{background:var(--primary);min-height:100vh;padding:1.5rem 1rem;width:240px;position:fixed;}
.sidebar a{color:rgba(255,255,255,.7);text-decoration:none;display:block;padding:.6rem 1rem;border-radius:8px;margin-bottom:4px;font-size:.9rem;transition:.2s;}
.sidebar a:hover,.sidebar a.active{color:#fff;background:rgba(255,255,255,.12);}
.sidebar .logo{color:#fff;font-weight:700;font-size:1.2rem;margin-bottom:2rem;padding:.5rem 1rem;}
.main-content{margin-left:240px;padding:2rem;}
.stat-card{border-radius:12px;padding:1.5rem;color:#fff;position:relative;overflow:hidden;}
.stat-card .icon{position:absolute;right:1rem;top:50%;transform:translateY(-50%);font-size:2.5rem;opacity:.25;}
.slot-box{width:52px;height:40px;border-radius:6px;display:inline-flex;align-items:center;justify-content:center;font-size:.65rem;font-weight:600;margin:2px;border:2px solid transparent;}
.slot-box.available{background:#d4edda;color:#155724;border-color:#b1dfbb;}
.slot-box.occupied{background:#f8d7da;color:#721c24;border-color:#f5c6cb;}
.slot-box.ev{border-color:var(--accent);}
</style>
</head>
<body>
<div class="sidebar">
  <div class="logo"><i class="bi bi-car-front-fill"></i> SmartPark</div>
  <a href="{% url 'dashboard' %}" class="{% if request.resolver_match.url_name == 'dashboard' %}active{% endif %}"><i class="bi bi-speedometer2 me-2"></i>Dashboard</a>
  <a href="{% url 'park_vehicle' %}" class="{% if request.resolver_match.url_name == 'park_vehicle' %}active{% endif %}"><i class="bi bi-box-arrow-in-right me-2"></i>Park Vehicle</a>
  <a href="{% url 'exit_vehicle' %}" class="{% if request.resolver_match.url_name == 'exit_vehicle' %}active{% endif %}"><i class="bi bi-box-arrow-right me-2"></i>Exit Vehicle</a>
  <a href="{% url 'monitor' %}" class="{% if request.resolver_match.url_name == 'monitor' %}active{% endif %}"><i class="bi bi-grid-3x3 me-2"></i>Monitor Lot</a>
  <a href="{% url 'manage_config' %}" class="{% if request.resolver_match.url_name == 'manage_config' %}active{% endif %}"><i class="bi bi-gear me-2"></i>Configuration</a>
  <a href="{% url 'history' %}" class="{% if request.resolver_match.url_name == 'history' %}active{% endif %}"><i class="bi bi-clock-history me-2"></i>History</a>
</div>
<div class="main-content">
  {% if messages %}
  {% for m in messages %}
  <div class="alert alert-{{ m.tags }} alert-dismissible fade show" role="alert">{{ m }}<button type="button" class="btn-close" data-bs-dismiss="alert"></button></div>
  {% endfor %}
  {% endif %}
  {% block content %}{% endblock %}
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
